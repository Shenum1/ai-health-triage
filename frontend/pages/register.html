<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create account — MediTriage AI</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; background: var(--gray-50); }
    .auth-page {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 48px 16px;
    }
    .auth-card {
      background: var(--white); border: 1px solid var(--gray-100);
      border-radius: var(--radius-lg); box-shadow: var(--shadow-md);
      padding: 40px 36px; width: 100%; max-width: 440px;
    }
    .auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .auth-logo__icon {
      width: 36px; height: 36px; background: var(--navy);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
    }
    .auth-logo__name { font-family: var(--font-serif); font-size: 1.15rem; color: var(--navy); }
    .auth-card h2 { font-size: 1.5rem; margin-bottom: 6px; }
    .auth-sub { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 24px; }
    .auth-form { display: flex; flex-direction: column; gap: 16px; }
    .form-footer { text-align: center; font-size: 0.875rem; color: var(--text-muted); margin-top: 8px; }
    .form-footer a { color: var(--navy-mid); font-weight: 500; }

    .pw-toggle { position: relative; }
    .pw-toggle input { padding-right: 44px; }
    .pw-toggle__btn {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--gray-300);
      padding: 4px; display: flex; align-items: center;
    }

    .pw-strength { margin-top: 6px; }
    .pw-strength__track {
      height: 4px; background: var(--gray-100); border-radius: 2px; overflow: hidden;
    }
    .pw-strength__bar {
      height: 100%; width: 0; border-radius: 2px;
      transition: width 0.3s ease, background 0.3s ease;
    }
    .pw-strength__label { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }

    .terms-note {
      font-size: 0.775rem; color: var(--text-muted); text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body data-page="register">

<nav class="navbar">
  <div class="navbar__inner">
    <a href="/" class="navbar__brand">
      <div class="navbar__brand-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </div>
      MediTriage AI
    </a>
    <div class="navbar__links">
      <span class="text-muted" style="font-size:0.875rem;" class="hide-mobile">Already have an account?</span>
      <a href="/login" class="btn btn--ghost btn--sm">Sign in</a>
    </div>
  </div>
</nav>

<main class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo__icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </div>
      <span class="auth-logo__name">MediTriage AI</span>
    </div>

    <h2>Create your account</h2>
    <p class="auth-sub">Free to use. No credit card required.</p>

    <div id="register-alert" class="alert alert--error mb-2"></div>

    <form id="register-form" class="auth-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="register-name">Full name</label>
        <input class="form-input" type="text" id="register-name" placeholder="Jane Smith" autocomplete="name" required />
        <span class="form-error" id="register-name-error"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="register-email">Email address</label>
        <input class="form-input" type="email" id="register-email" placeholder="you@example.com" autocomplete="email" required />
        <span class="form-error" id="register-email-error"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="register-password">Password</label>
        <div class="pw-toggle">
          <input class="form-input" type="password" id="register-password" placeholder="Min. 8 characters" autocomplete="new-password" required />
          <button type="button" class="pw-toggle__btn" onclick="togglePw('register-password', this)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="pw-strength">
          <div class="pw-strength__track"><div class="pw-strength__bar" id="pw-strength-bar"></div></div>
          <div class="pw-strength__label" id="pw-strength-text"></div>
        </div>
        <span class="form-error" id="register-password-error"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="register-confirm">Confirm password</label>
        <input class="form-input" type="password" id="register-confirm" placeholder="Repeat password" autocomplete="new-password" required />
        <span class="form-error" id="register-confirm-error"></span>
      </div>

      <button type="submit" id="register-btn" class="btn btn--primary btn--full">
        Create account
      </button>

      <p class="terms-note">
        By creating an account you acknowledge this service is for informational purposes only
        and is not a substitute for professional medical advice.
      </p>
    </form>

    <p class="form-footer mt-2">
      Already have an account? <a href="/login">Sign in</a>
    </p>
  </div>
</main>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
  function togglePw(id, btn) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
  }
</script>
</body>
</html>
