<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — MediTriage AI</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; background: var(--gray-50); }
    .auth-page {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 48px 16px;
    }
    .auth-card {
      background: var(--white); border: 1px solid var(--gray-100);
      border-radius: var(--radius-lg); box-shadow: var(--shadow-md);
      padding: 40px 36px; width: 100%; max-width: 420px;
    }
    .auth-logo {
      display: flex; align-items: center; gap: 10px; margin-bottom: 32px;
    }
    .auth-logo__icon {
      width: 36px; height: 36px; background: var(--navy);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
    }
    .auth-logo__name { font-family: var(--font-serif); font-size: 1.15rem; color: var(--navy); }
    .auth-card h2 { font-size: 1.5rem; margin-bottom: 6px; }
    .auth-card .auth-sub { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 28px; }
    .auth-form { display: flex; flex-direction: column; gap: 18px; }
    .form-footer { text-align: center; font-size: 0.875rem; color: var(--text-muted); margin-top: 8px; }
    .form-footer a { color: var(--navy-mid); font-weight: 500; }
    .divider { height: 1px; background: var(--gray-100); margin: 4px 0; }

    .pw-toggle {
      position: relative;
    }
    .pw-toggle input { padding-right: 44px; }
    .pw-toggle__btn {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--gray-300);
      padding: 4px; display: flex; align-items: center;
    }
    .pw-toggle__btn:hover { color: var(--text-muted); }
  </style>
</head>
<body data-page="login">

<nav class="navbar">
  <div class="navbar__inner">
    <a href="/" class="navbar__brand">
      <div class="navbar__brand-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </div>
      MediTriage AI
    </a>
    <div class="navbar__links">
      <span class="text-muted" style="font-size:0.875rem;">Don't have an account?</span>
      <a href="/register" class="btn btn--primary btn--sm">Sign up</a>
    </div>
  </div>
</nav>

<main class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo__icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </div>
      <span class="auth-logo__name">MediTriage AI</span>
    </div>

    <h2>Welcome back</h2>
    <p class="auth-sub">Sign in to your account to continue your consultation.</p>

    <div id="login-alert" class="alert alert--error mb-2"></div>

    <form id="login-form" class="auth-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="login-email">Email address</label>
        <input
          class="form-input" type="email" id="login-email"
          placeholder="you@example.com" autocomplete="email" required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <div class="pw-toggle">
          <input
            class="form-input" type="password" id="login-password"
            placeholder="••••••••" autocomplete="current-password" required
          />
          <button type="button" class="pw-toggle__btn" onclick="togglePw('login-password', this)" aria-label="Show password">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" id="login-btn" class="btn btn--primary btn--full">
        Sign in
      </button>
    </form>

    <div class="divider mt-2"></div>
    <p class="form-footer mt-2">
      Don't have an account? <a href="/register">Create one free</a>
    </p>
  </div>
</main>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
  function togglePw(id, btn) {
    const input = document.getElementById(id);
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    btn.style.color = isHidden ? 'var(--navy-mid)' : 'var(--gray-300)';
  }
</script>
</body>
</html>
